<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">
        <h2>Add Expense</h2>

        <a href="home.html" class="btn btn-outline-primary">
            ← Home
        </a>
    </div>

    <div class="card shadow p-4">

        <div class="mb-3">
            <label>Rent</label>
            <input type="number" id="rent" class="form-control">
        </div>

        <div class="mb-3">
            <label>Grocery</label>
            <input type="number" id="grocery" class="form-control">
        </div>

        <div class="mb-3">
            <label>Electricity</label>
            <input type="number" id="electricity" class="form-control">
        </div>

        <div class="mb-3">
            <label>Wifi</label>
            <input type="number" id="wifi" class="form-control">
        </div>

        <div class="mb-3">
            <label>Miscellaneous</label>
            <input type="number" id="miscellaneous" class="form-control">
        </div>

        <button onclick="addExpense()" class="btn btn-success w-100">
            Add Expense
        </button>

        <p id="msg" class="mt-3 text-center"></p>

    </div>

</div>

<script>

async function addExpense() {

    const data = {
        rent: Number(document.getElementById("rent").value) || 0,
        grocery: Number(document.getElementById("grocery").value) || 0,
        electricity: Number(document.getElementById("electricity").value) || 0,
        wifi: Number(document.getElementById("wifi").value) || 0,
        miscellaneous: Number(document.getElementById("miscellaneous").value) || 0
    };

    try {
        const response = await fetch("http://127.0.0.1:5000/expenses", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
                });

        const result = await response.json();

        console.log(result);

        document.getElementById("msg").innerText =
            "Expense added successfully!";

        document.getElementById("msg").style.color = "green";

        // clear inputs
        document.getElementById("rent").value = "";
        document.getElementById("grocery").value = "";
        document.getElementById("electricity").value = "";
        document.getElementById("wifi").value = "";
        document.getElementById("miscellaneous").value = "";

        // redirect after 1.5 seconds
        setTimeout(() => {
            window.location.href = "home.html";
        }, 1500);

    } catch (error) {
        console.log("Error:", error);

        document.getElementById("msg").innerText =
            "Failed to add expense";

        document.getElementById("msg").style.color = "red";
    }
}

</script>

</body>
</html>
