<!DOCTYPE html>
<html>
<head>
    <title>Expense Data</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Expense Data
    </h2>

    <div class="card shadow p-4">

        <table class="table table-bordered align-middle">

            <thead class="table-dark">

                <tr>
                    <th>S.No</th>
                    <th>Rent</th>
                    <th>Grocery</th>
                    <th>Electricity</th>
                    <th>Wifi</th>
                    <th>Miscellaneous</th>
                    <th>Total</th>
                    <th style="width: 170px;">Action</th>
                </tr>

            </thead>

            <tbody id="expenseBody">

                <!-- New entry row -->

                <tr>

                    <td>1</td>

                    <td>
                        <input type="number" class="form-control">
                    </td>

                    <td>
                        <input type="number" class="form-control">
                    </td>

                    <td>
                        <input type="number" class="form-control">
                    </td>

                    <td>
                        <input type="number" class="form-control">
                    </td>

                    <td>
                        <input type="number" class="form-control">
                    </td>

                    <td class="total">
                        0
                    </td>

                    <td>
                        <button onclick="addRow(this)" class="btn btn-success btn-sm">
                        Add Expense
                        </button>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
<script>

let rowCount = 1;

// calculate per row
function calculateRowTotal(row) {

    let inputs = row.querySelectorAll("input");

    if (inputs.length < 5) return;

    let rent = Number(inputs[0].value) || 0;
    let grocery = Number(inputs[1].value) || 0;
    let electricity = Number(inputs[2].value) || 0;
    let wifi = Number(inputs[3].value) || 0;
    let miscellaneous = Number(inputs[4].value) || 0;

    let total = rent + grocery + electricity + wifi + miscellaneous;

    let totalCell = row.querySelector(".total");
    if (totalCell) totalCell.innerText = total;
}

// live typing
document.addEventListener("input", function(e) {

    if (e.target.tagName === "INPUT") {

        let row = e.target.closest("tr");
        calculateRowTotal(row);
    }
});

// add new row
function addRow(button) {

    let currentRow = button.closest("tr");

    // lock current row action
    button.parentElement.innerHTML = `
        <button class="btn btn-warning btn-sm">Update</button>
        <button class="btn btn-danger btn-sm">Delete</button>
    `;

    // new serial number
    let serialCell = currentRow.querySelector("td");
    serialCell.innerText = rowCount;

    rowCount++;

    // create new row
    let newRow = document.createElement("tr");

    newRow.innerHTML = `
        <td>${rowCount}</td>

        <td><input type="number" class="form-control"></td>
        <td><input type="number" class="form-control"></td>
        <td><input type="number" class="form-control"></td>
        <td><input type="number" class="form-control"></td>
        <td><input type="number" class="form-control"></td>

        <td class="total">0</td>

        <td>
            <button class="btn btn-success btn-sm" onclick="addRow(this)">
                Add Expense
            </button>
        </td>
    `;

    document.getElementById("expenseBody").appendChild(newRow);

    calculateRowTotal(newRow);
}

</script>
</body>
</html>
