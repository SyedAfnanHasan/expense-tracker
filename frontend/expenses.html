<!DOCTYPE html>
<html>
<head>
    <title>Expense Data</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h2>Expense Data</h2>

        <a href="home.html" class="btn btn-outline-primary">
            ← Home
        </a>
    </div>

    <div class="card shadow p-4">

        <table class="table table-bordered align-middle">

            <thead class="table-dark">
                <tr>
                    <th>S.No</th>
                    <th>Rent</th>
                    <th>Grocery</th>
                    <th>Electricity</th>
                    <th>Wifi</th>
                    <th>Miscellaneous</th>
                    <th>Total</th>
                    <th style="width: 170px;">Action</th>
                </tr>
            </thead>

            <tbody id="expenseBody">
                <!-- Data loads here -->
            </tbody>

        </table>

    </div>

</div>

<script>

let rowCount = 0;

window.onload = loadExpenses;

// =======================
// LOAD FROM BACKEND
// =======================
async function loadExpenses() {
    try {
        const response = await fetch("http://127.0.0.1:5000/view");
        const data = await response.json();

        console.log("DATA:", data);

        const tbody = document.getElementById("expenseBody");
        tbody.innerHTML = "";

        rowCount = 0;

        data.expenses.forEach(expense => {

            rowCount++;

            let row = document.createElement("tr");

            row.innerHTML = `
                <td>${rowCount}</td>

                <td><input class="form-control" value="${expense.rent}"></td>
                <td><input class="form-control" value="${expense.grocery}"></td>
                <td><input class="form-control" value="${expense.electricity}"></td>
                <td><input class="form-control" value="${expense.wifi}"></td>
                <td><input class="form-control" value="${expense.miscellaneous}"></td>

                <td class="total">0</td>

                <td>
                    <button class="btn btn-warning btn-sm"
                        onclick="updateExpense(${expense.id}, this)">
                        Update
                    </button>

                    <button class="btn btn-danger btn-sm">
                        Delete
                    </button>
                </td>
            `;

            tbody.appendChild(row);
            calculateRowTotal(row);
        });

    } catch (error) {
        console.log("Error loading expenses:", error);
    }
}

// =======================
// UPDATE EXPENSE
// =======================
async function updateExpense(id, button) {

    let row = button.closest("tr");
    let inputs = row.querySelectorAll("input");

    let data = {
        id: id,
        rent: Number(inputs[0].value),
        grocery: Number(inputs[1].value),
        electricity: Number(inputs[2].value),
        wifi: Number(inputs[3].value),
        miscellaneous: Number(inputs[4].value)
    };

    await fetch("http://127.0.0.1:5000/edit", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    alert("Expense updated!");
    loadExpenses();
}

// =======================
// CALCULATE ROW TOTAL
// =======================
function calculateRowTotal(row) {

    let inputs = row.querySelectorAll("input");

    let rent = Number(inputs[0].value) || 0;
    let grocery = Number(inputs[1].value) || 0;
    let electricity = Number(inputs[2].value) || 0;
    let wifi = Number(inputs[3].value) || 0;
    let miscellaneous = Number(inputs[4].value) || 0;

    let total =
        rent + grocery + electricity + wifi + miscellaneous;

    row.querySelector(".total").innerText = total;
}

// live update while typing
document.addEventListener("input", function(e) {
    if (e.target.tagName === "INPUT") {
        let row = e.target.closest("tr");
        calculateRowTotal(row);
    }
});

</script>

</body>
</html>
