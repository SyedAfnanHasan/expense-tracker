<!DOCTYPE html>
<html>
<head>
    <title>My Total Expenses</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container d-flex justify-content-center align-items-center" style="height: 90vh;">

    <div class="card shadow p-5 text-center" style="width: 350px; border-radius: 15px;">

        <h2 class="mb-3">My Total Expenses</h2>

        <hr>

        <h5 class="text-muted">Total Expense</h5>

        <h1 id="total" class="my-3 text-success">€0.00</h1>

        <a href="expenses.html" class="btn btn-primary mt-3">
            View Expense Data
        </a>

    </div>

</div>

<script>
async function loadExpenses() {
    try {
        const response = await fetch("http://127.0.0.1:5000/view");
        const data = await response.json();

        console.log("API DATA:", data);

        let total = 0;

        data.expenses.forEach(expense => {
            total +=
                (expense.rent || 0) +
                (expense.grocery || 0) +
                (expense.electricity || 0) +
                (expense.wifi || 0) +
                (expense.miscellaneous || 0);
        });

        document.getElementById("total").innerText =
            "€" + total.toFixed(2);

    } catch (error) {
        console.log("Error fetching expenses:", error);
    }
}

window.onload = loadExpenses;
</script>

</body>
</html>
